<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Live Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<div id="scanline"></div>
<div id="app">

    <div id="sidebar">

        <div id="logo">
            <div id="logo-icon">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" stroke="#00f5c4" stroke-width="1.5" stroke-dasharray="4 2"/>
                    <circle cx="20" cy="20" r="10" stroke="#00f5c4" stroke-width="1" opacity="0.5"/>
                    <line x1="20" y1="2" x2="20" y2="38" stroke="#00f5c4" stroke-width="0.5" opacity="0.3"/>
                    <line x1="2" y1="20" x2="38" y2="20" stroke="#00f5c4" stroke-width="0.5" opacity="0.3"/>
                    <circle cx="20" cy="20" r="2" fill="#00f5c4"/>
                    <line id="radar-sweep-svg" x1="20" y1="20" x2="20" y2="2" stroke="#00f5c4" stroke-width="1.5" opacity="0.9"/>
                </svg>
            </div>
            <div id="logo-text">
                <div id="logo-title">WORLD TRACKER</div>
                <div id="logo-sub">LIVE INTELLIGENCE SYSTEM</div>
            </div>
        </div>

        <div id="nav">
            <button class="nav-btn active" id="btn-flights" onclick="loadFlights()">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
                </span>
                <span class="nav-label">LIVE FLIGHTS</span>
                <span class="nav-badge" id="badge-flights">—</span>
            </button>

            <button class="nav-btn" id="btn-quakes" onclick="loadEarthquakes()">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2.05v2.02c3.95.49 7 3.85 7 7.93 0 3.21-1.81 6-4.72 7.28L13 17v5h5l-1.22-1.22C19.91 19.07 22 15.76 22 12c0-5.18-3.95-9.45-9-9.95zM11 2.05C5.95 2.55 2 6.82 2 12c0 3.76 2.09 7.07 5.22 8.78L6 22h5v-5l-2.28 2.28C7.09 18.11 6 15.22 6 12c0-3.93 2.61-7.25 6-8.42V2.05z"/></svg>
                </span>
                <span class="nav-label">EARTHQUAKES</span>
                <span class="nav-badge" id="badge-quakes">—</span>
            </button>

            <button class="nav-btn" id="btn-weather" onclick="enableWeather()">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/></svg>
                </span>
                <span class="nav-label">WEATHER</span>
                <span class="nav-badge" id="badge-weather">CLICK</span>
            </button>

            <button class="nav-btn nav-btn-clear" id="btn-clear" onclick="clearMap()">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </span>
                <span class="nav-label">CLEAR</span>
            </button>
        </div>

        <div id="status-panel">
            <div class="panel-label">// STATUS</div>
            <div id="status">SYSTEM READY</div>
        </div>

        <div id="legend" style="display:none">
            <div class="panel-label">// MAGNITUDE</div>
            <div id="legend-content"></div>
        </div>

        <div id="pod-panel">
            <div class="panel-label">// NODE INFO</div>
            <div id="pod-info">CONNECTING...</div>
        </div>

    </div>

    <div id="map-wrap">
        <div id="map"></div>
        <div id="crosshair-h"></div>
        <div id="crosshair-v"></div>
        <div id="coords-display"></div>
    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
