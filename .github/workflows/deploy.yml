name: World Tracker CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: world-tracker
  AWS_REGION: eu-west-1
  EKS_CLUSTER_NAME: world-tracker-cluster

jobs:

# ── Job 1: Build and Push Docker Image ──────────────────────────────────────
  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

# ── Job 2: Provision Infrastructure with Terraform ──────────────────────────
  terraform:
    name: Provision AWS Infrastructure
    runs-on: ubuntu-latest
    needs: build-and-push

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve

# ── Job 3: Deploy to EKS ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy to Kubernetes
        run: |
          IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)
          sed -i "s|\$IMAGE_TAG|$IMAGE_TAG|g" k8s/deployment.yml
          kubectl apply -f k8s/namespace.yml
          kubectl wait --for=jsonpath='{.status.phase}'=Active \
            namespace/world-tracker --timeout=30s
          kubectl apply -f k8s/configmap.yml
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml
          kubectl rollout status deployment/world-tracker \
            -n world-tracker \
            --timeout=120s
      - name: Get app URL
        run: |
          echo "Waiting for LoadBalancer to be assigned..."
          kubectl wait --for=jsonpath='{.status.loadBalancer.ingress}' \
            service/world-tracker \
            -n world-tracker \
            --timeout=120s
          APP_URL=$(kubectl get svc world-tracker \
            -n world-tracker \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌍 App is live at: http://$APP_URL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "APP_URL=$APP_URL" >> $GITHUB_ENV

# ── Job 4: Ansible Smoke Test ────────────────────────────────────────────────
  smoke-test:
    name: Ansible Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Get app URL
        run: |
          APP_URL=$(kubectl get svc world-tracker \
            -n world-tracker \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "APP_URL=$APP_URL" >> $GITHUB_ENV

      - name: Run Ansible smoke test
        run: |
          ansible-playbook ansible/playbooks/smoke-test.yml \
            -e "app_url=http://${{ env.APP_URL }}"