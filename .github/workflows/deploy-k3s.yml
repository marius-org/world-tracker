name: World Tracker — k3s Deploy

on:
  push:
    branches:
      - k3s
    paths-ignore:
      - 'k3s/**'
      - '*.md'

env:
  IMAGE_NAME: mariuseu/world-tracker

jobs:

  build-and-push:
    name: Build & Push Docker Image
    runs-on: control-node

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:k3s-latest
            ${{ env.IMAGE_NAME }}:k3s-${{ github.run_number }}

      - name: Update image tag in manifest
        run: |
          sed -i "s|${{ env.IMAGE_NAME }}:.*|${{ env.IMAGE_NAME }}:k3s-${{ env.IMAGE_TAG }}|g" \
            k3s/deployment.yml

      - name: Commit and push updated manifest
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k3s/deployment.yml
          git commit -m "Deploy world-tracker k3s-${{ env.IMAGE_TAG }} [skip ci]"
          git push
